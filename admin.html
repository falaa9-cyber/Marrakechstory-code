<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin · Marrakech Story submissions</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Source+Sans+3:wght@400;600&family=Inter:wght@500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --espresso:#14110F; --charcoal:#1E1C1A; --sand:#C9B99A; --sand-dark:#B5A486;
      --bg-page:#FAF8F4; --cream:#FAFAF8; --sandbg:#F5F5F0;
      --ink:#2A2118; --ink-2:#3D3329; --ink-3:#7A6E5E; --brand:#e0432a; --line:#E8E3D6;
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--bg-page);color:var(--ink-2);font-family:"Source Sans 3",system-ui,sans-serif;font-size:15px;line-height:1.55}
    a{color:var(--brand)}
    .wrap{max-width:1280px;margin:0 auto;padding:40px 5vw}
    header.bar{display:flex;align-items:baseline;gap:18px;margin-bottom:32px;padding-bottom:18px;border-bottom:1px solid var(--line)}
    header.bar h1{font-family:"Playfair Display",Georgia,serif;font-weight:600;font-size:32px;letter-spacing:-.01em;margin:0;color:var(--ink)}
    header.bar .eyebrow{font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-3)}
    .login{max-width:380px;margin:80px auto;padding:28px;border:1px solid var(--line);background:#fff}
    .login h2{font-family:"Playfair Display",serif;margin:0 0 8px;font-size:22px}
    .login p{margin:0 0 18px;font-size:13px;color:var(--ink-3)}
    .login input{display:block;width:100%;padding:12px 14px;border:1px solid var(--line);background:#fff;font-family:inherit;font-size:14px}
    .login input:focus{outline:2px solid var(--brand);outline-offset:0;border-color:var(--brand)}
    .btn{display:inline-block;padding:12px 22px;border:1px solid var(--brand);background:var(--brand);color:#fff;font-family:"Inter",sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
    .btn:hover{background:var(--brand)}
    .btn-outline{background:transparent;color:var(--ink);border-color:var(--ink)}
    .btn-outline:hover{background:var(--ink);color:#fff}
    .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:0 0 18px}
    .toolbar select,.toolbar input{padding:8px 12px;border:1px solid var(--line);background:#fff;font-size:13px;font-family:inherit}
    .stat{font-size:12px;color:var(--ink-3);font-family:"JetBrains Mono",monospace;margin-left:auto}
    .err{color:var(--brand);font-size:13px;margin-top:10px}
    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);font-size:13px}
    thead th{text-align:left;padding:10px 12px;background:var(--sandbg);font-family:"Inter",sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:600;border-bottom:1px solid var(--line)}
    tbody td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--ink)}
    tbody tr:hover{background:var(--cream)}
    tbody tr.expanded td{background:var(--cream)}
    .kind{display:inline-block;padding:2px 8px;font-family:"Inter",sans-serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;background:#F5F0E8;color:var(--ink)}
    .kind.itinerary{background:#F5F0E8;color:var(--brand)}
    .kind.quickbook{background:#EDE4D4;color:var(--ink)}
    .kind.tweak{background:#E1D4BB;color:var(--ink)}
    .row-expand{cursor:pointer}
    .row-payload{font-family:"JetBrains Mono",monospace;font-size:11.5px;white-space:pre-wrap;word-break:break-word;background:var(--bg-page);padding:14px;border:1px solid var(--line);max-width:100%;overflow:auto;color:var(--ink-2);line-height:1.45}
    .mono{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-3)}
    .name{font-weight:600;color:var(--ink)}
    .small{font-size:11px;color:var(--ink-3)}
    .pill{display:inline-block;padding:1px 7px;background:var(--sandbg);font-size:10px;color:var(--ink-3);font-family:"Inter",sans-serif;letter-spacing:.06em;text-transform:uppercase}
  </style>
</head>
<body>
  <div id="root">Loading…</div>

  <script src="src/env.js?v=74"></script>
  <script>
    /* eslint-env browser */
    (function () {
      const root = document.getElementById('root');
      const SUPABASE_URL = (window.MS_ENV && window.MS_ENV.SUPABASE_URL) || '';
      const FN_URL = SUPABASE_URL.replace(/\/$/, '') + '/functions/v1/list-submissions';

      function el(tag, attrs, ...children) {
        const e = document.createElement(tag);
        if (attrs) for (const k in attrs) {
          if (k === 'class')        e.className = attrs[k];
          else if (k === 'onclick') e.addEventListener('click', attrs[k]);
          else if (k === 'html')    e.innerHTML = attrs[k];
          else                       e.setAttribute(k, attrs[k]);
        }
        for (const c of children) if (c != null) e.append(c.nodeType ? c : document.createTextNode(c));
        return e;
      }

      function login(err) {
        root.innerHTML = '';
        const box = el('div', { class: 'login' },
          el('h2', null, 'Admin'),
          el('p', null, 'Enter the admin password to view submissions.')
        );
        const input = el('input', { type: 'password', placeholder: '••••••••••', autofocus: 'true' });
        const submit = el('button', { class: 'btn', style: 'margin-top:14px;width:100%' }, 'Unlock');
        const errEl  = el('p', { class: 'err' }, err || '');
        const form = el('form');
        form.append(input, submit, errEl);
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          submit.textContent = 'Checking…';
          const r = await fetchList(input.value);
          if (r.ok) {
            sessionStorage.setItem('ms_admin_pw', input.value);
            renderList(r);
          } else {
            errEl.textContent = r.error || 'Wrong password';
            submit.textContent = 'Unlock';
          }
        });
        box.append(form);
        root.append(box);
      }

      async function fetchList(pw, opts) {
        try {
          const body = { password: pw, limit: (opts && opts.limit) || 100 };
          if (opts && opts.kind && opts.kind !== 'all') body.kind = opts.kind;
          const r = await fetch(FN_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const j = await r.json();
          return j;
        } catch (e) { return { ok: false, error: String(e && e.message || e) }; }
      }

      function fmt(d) {
        if (!d) return '—';
        const dt = new Date(d);
        return dt.toLocaleString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }

      function renderList(initial) {
        let kindFilter = 'all';
        let rowsCache = initial.rows;
        const pw = sessionStorage.getItem('ms_admin_pw');

        root.innerHTML = '';
        const wrap = el('div', { class: 'wrap' });

        const head = el('header', { class: 'bar' },
          el('div', null,
            el('div', { class: 'eyebrow' }, '— ADMIN'),
            el('h1', null, 'Form submissions')
          ),
          el('div', { class: 'stat' }, '')
        );
        wrap.append(head);

        const toolbar = el('div', { class: 'toolbar' });
        const select = el('select', null);
        for (const k of ['all','itinerary','quickbook','tweak']) {
          select.append(el('option', { value: k }, k.toUpperCase()));
        }
        const refresh = el('button', { class: 'btn btn-outline' }, 'Refresh');
        const logout  = el('button', { class: 'btn btn-outline' }, 'Sign out');
        const stat    = el('span', { class: 'stat' }, '');
        toolbar.append(select, refresh, logout, stat);
        wrap.append(toolbar);

        const tableWrap = el('div');
        wrap.append(tableWrap);

        function paint() {
          tableWrap.innerHTML = '';
          const tbl = el('table');
          const thead = el('thead', null,
            el('tr', null,
              el('th', null, 'Created'),
              el('th', null, 'Kind'),
              el('th', null, 'Name'),
              el('th', null, 'Email'),
              el('th', null, 'Phone'),
              el('th', null, 'Dates'),
              el('th', null, 'Days'),
              el('th', null, 'Via')
            )
          );
          const tbody = el('tbody');
          rowsCache.forEach((r, idx) => {
            const tr = el('tr', { class: 'row-expand' });
            tr.addEventListener('click', () => {
              const next = tr.nextSibling;
              if (next && next.classList && next.classList.contains('detail')) {
                next.remove();
                tr.classList.remove('expanded');
              } else {
                tr.classList.add('expanded');
                const detail = el('tr', { class: 'detail' });
                const td = el('td', { colspan: '8' });
                td.append(el('pre', { class: 'row-payload' }, JSON.stringify(r.payload || {}, null, 2)));
                detail.append(td);
                tr.parentNode.insertBefore(detail, tr.nextSibling);
              }
            });
            tr.append(
              el('td', null, el('span', { class: 'mono' }, fmt(r.created_at))),
              el('td', null, el('span', { class: 'kind ' + (r.kind || '') }, r.kind || '—')),
              el('td', null, el('span', { class: 'name' }, r.name || '—')),
              el('td', null, r.email ? el('a', { href: 'mailto:' + r.email }, r.email) : '—'),
              el('td', null, r.phone ? el('a', { href: 'tel:' + r.phone }, r.phone) : '—'),
              el('td', null,
                el('span', { class: 'small' }, [r.start_date, r.end_date].filter(Boolean).join(' → ') || '—')
              ),
              el('td', null, r.duration ?? '—'),
              el('td', null, el('span', { class: 'pill' }, r.via || '—'))
            );
            tbody.append(tr);
          });
          tbl.append(thead, tbody);
          tableWrap.append(tbl);
          stat.textContent = rowsCache.length + ' rows';
        }

        async function reload() {
          refresh.textContent = '…';
          const r = await fetchList(pw, { kind: kindFilter, limit: 200 });
          if (!r.ok) { refresh.textContent = 'Refresh'; alert(r.error || 'Failed'); return; }
          rowsCache = r.rows;
          paint();
          refresh.textContent = 'Refresh';
        }

        select.addEventListener('change', () => { kindFilter = select.value; reload(); });
        refresh.addEventListener('click', reload);
        logout.addEventListener('click', () => {
          sessionStorage.removeItem('ms_admin_pw');
          login(null);
        });

        root.innerHTML = '';
        root.append(wrap);
        paint();
      }

      // Boot
      const cachedPw = sessionStorage.getItem('ms_admin_pw');
      if (cachedPw) {
        fetchList(cachedPw, { limit: 100 }).then((r) => {
          if (r.ok) renderList(r);
          else { sessionStorage.removeItem('ms_admin_pw'); login(r.error); }
        });
      } else {
        login(null);
      }
    })();
  </script>
</body>
</html>
